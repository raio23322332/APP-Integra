# .github/workflows/deploy-play-store.yml
name: 🚀 Build & Deploy to Play Store

on:
  push:
    branches: [main, production]
  workflow_dispatch:
    inputs:
      track:
        description: 'Faixa de lançamento'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
          - development

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    
    steps:
      # 📥 Checkout
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      # 🎯 Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'
          channel: 'stable'
      
      # 🏷️ Versão Automática
      - name: Generate Version
        id: version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          DATE=$(date +'%Y.%m.%d')
          echo "version_code=$COMMIT_COUNT" >> $GITHUB_OUTPUT
          echo "version_name=${DATE}+${COMMIT_COUNT}" >> $GITHUB_OUTPUT
          echo "📱 Version Code: $COMMIT_COUNT"
          echo "🏷️ Version Name: ${DATE}+${COMMIT_COUNT}"
      
      # 📦 Dependencies
      - name: Install dependencies
        run: flutter pub get
      
      # 🔑 Keystore
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
      
      # 📝 Key Properties
      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyAlias=upload" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties
      
      # 🚀 Build AAB
      - name: Build App Bundle
        run: |
          flutter build appbundle \
            --release \
            --build-number=${{ steps.version.outputs.version_code }} \
            --build-name=${{ steps.version.outputs.version_name }}
      
      # 📤 UPLOAD PARA PLAY STORE (Automático)
      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT }}
          packageName: com.example.integra  # ⚠️ ALTERE PARA SEU PACKAGE NAME
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          status: completed  # draft | inProgress | halted | completed
          # whatsNewDirectory: distribution/whatsnew/  # Opcional: release notes
      
      # 📦 Salvar Artefato
      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle-v${{ steps.version.outputs.version_code }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
      
      # 🏷️ Tag no Git
      - name: Create Git Tag
        if: success()
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "playstore-v${{ steps.version.outputs.version_name }}" -m "Deployed to Play Store: ${{ steps.version.outputs.version_code }}"
          git push origin "playstore-v${{ steps.version.outputs.version_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      # ✅ Notificação de Sucesso
      - name: Success Notification
        if: success()
        run: |
          echo "🎉 Deploy realizado com sucesso!"
          echo "📱 Versão: ${{ steps.version.outputs.version_name }}"
          echo "🚀 Track: ${{ github.event.inputs.track || 'internal' }}"