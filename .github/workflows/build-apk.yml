# .github/workflows/build-apk.yml
name: 📦 Build APK

on:
  push:
    branches: [development, staging]
  workflow_dispatch:  # Permite executar manualmente

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      # 📥 Checkout
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      # 🎯 Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'
          channel: 'stable'
      
      # 🏷️ Gerar Versão
      - name: Generate Version
        id: version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          DATE=$(date +'%Y.%m.%d')
          echo "version_code=$COMMIT_COUNT" >> $GITHUB_OUTPUT
          echo "version_name=${DATE}+${COMMIT_COUNT}" >> $GITHUB_OUTPUT
          echo "📱 Version Code: $COMMIT_COUNT"
          echo "🏷️ Version Name: ${DATE}+${COMMIT_COUNT}"
      
      # 📦 Dependencies
      - name: Install dependencies
        run: flutter pub get
      
      # 🔑 Keystore
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
      
      # 📝 Key Properties
      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyAlias=upload" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties
      
      # 🚀 Build APK (com split por ABI)
      - name: Build APKs
        run: |
          flutter build apk \
            --release \
            --split-per-abi \
            --build-number=${{ steps.version.outputs.version_code }} \
            --build-name=${{ steps.version.outputs.version_name }}
      
      # 📤 Upload APKs (todos juntos)
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: 📱 apks-v${{ steps.version.outputs.version_code }}
          path: build/app/outputs/flutter-apk/*-release.apk
          retention-days: 30
      
      # 📤 Upload APK universal (fat apk) - opcional
      - name: Build Universal APK
        run: |
          flutter build apk \
            --release \
            --build-number=${{ steps.version.outputs.version_code }} \
            --build-name=${{ steps.version.outputs.version_name }}
      
      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: 📱 apk-universal-v${{ steps.version.outputs.version_code }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
      
      # 🏷️ Tag
      - name: Create Git Tag
        if: github.ref == 'refs/heads/staging' && success()
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "apk-v${{ steps.version.outputs.version_name }}" -m "APK Build ${{ steps.version.outputs.version_code }}"
          git push origin "apk-v${{ steps.version.outputs.version_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}